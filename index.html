<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Saam Gemini AI</title>

<style>

body{
margin:0;
font-family:Arial;
background:#343541;
color:white;
display:flex;
flex-direction:column;
height:100vh;
}

header{
background:#202123;
padding:15px;
text-align:center;
font-size:20px;
}

#chat{
flex:1;
overflow-y:auto;
padding:20px;
}

.message{
max-width:70%;
padding:12px;
margin:10px;
border-radius:10px;
}

.user{
background:#444654;
margin-left:auto;
}

.bot{
background:#202123;
}

#inputArea{
display:flex;
padding:15px;
background:#40414f;
}

#input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
font-size:16px;
}

button{
padding:10px 15px;
margin-left:10px;
border:none;
background:#19c37d;
color:white;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<header>Saam Gemini AI</header>

<div id="chat"></div>

<div id="inputArea">
<input id="input" placeholder="Ask anything...">
<button onclick="send()">Send</button>
</div>

<script>

const API_KEY = "AIzaSyC4cPe2vS52GVTn2e3uATbX7UR7C6RObDU";

async function send(){

let input=document.getElementById("input").value;
if(!input) return;

let chat=document.getElementById("chat");

let userMsg=document.createElement("div");
userMsg.className="message user";
userMsg.innerText=input;

chat.appendChild(userMsg);

document.getElementById("input").value="";

let botMsg=document.createElement("div");
botMsg.className="message bot";
botMsg.innerText="Thinking...";

chat.appendChild(botMsg);

chat.scrollTop=chat.scrollHeight;

try{

let res=await fetch("https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key="+API_KEY,{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({
contents:[{
parts:[{text:input}]
}]
})
});

let data=await res.json();

botMsg.innerText=data.candidates[0].content.parts[0].text;

}catch{

botMsg.innerText="Error contacting AI.";

}

chat.scrollTop=chat.scrollHeight;

}

document.getElementById("input").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});

</script>

</body>
</html>
